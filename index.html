                <div className="rounded-[1.5rem] border border-white/10 bg-[#140f13]/75 shadow-[14px_14px_34px_rgba(216,181,139,0.08),8px_0_22px_rgba(216,181,139,0.05)] p-5 backdrop-blur-md">
                  {t.stats.slice(0, 2).map((item, index) => (

                <div className="rounded-[1.5rem] border border-white/10 bg-[#140f13]/75 shadow-[14px_14px_34px_rgba(216,181,139,0.08),8px_0_22px_rgba(216,181,139,0.05)] p-5 backdrop-blur-md">

            {/* Positioning */}

            {/* For / Not For */}
            <section className="mx-auto max-w-7xl px-6 py-20 lg:px-10">
              <div className="grid items-stretch gap-8 lg:grid-cols-2">
                <div className="rounded-[1.5rem] border border-white/10 bg-[#140f13]/75 shadow-[14px_14px_34px_rgba(216,181,139,0.08),8px_0_22px_rgba(216,181,139,0.05)] p-8 backdrop-blur-md">

                  <h3 className="mt-3 text-3xl font-semibold">{t.notHeading}</h3>

            <section className="mx-auto max-w-7xl px-6 py-4 lg:px-10">

                    <h3 className="mt-6 text-2xl font-semibold">{step.title}</h3>
                    <p className="mt-4 text-base leading-7 text-white/68">{step.body}</p>
                  </div>
                ))}
              </div>
            </section>

            {/* Role division */}
            <section className="mx-auto max-w-7xl px-6 py-20 lg:px-10">
              <div className="grid items-stretch gap-8 lg:grid-cols-[0.95fr_1.05fr]">
                <div className="rounded-[1.5rem] border border-white/10 bg-[#140f13]/75 shadow-[14px_14px_34px_rgba(216,181,139,0.08),8px_0_22px_rgba(216,181,139,0.05)] p-8 backdrop-blur-md">
                  <div className="text-sm uppercase tracking-[0.28em] text-[#d8b58b]">{t.roleKicker}</div>
                  <h2 className="mt-3 text-3xl font-semibold">{t.roleHeading}</h2>
                  <div className="mt-6 grid grid-cols-2 gap-3 text-sm text-white/76">
                    {t.roleItems.map((item) => (
                      <div key={item} className="rounded-[1rem] border border-white/10 bg-[#140f13]/75 px-4 py-3 backdrop-blur-md">{item}</div>
                    ))}
                  </div>
                  <p className="mt-6 text-base leading-8 text-[#f6efe8]">{t.roleBody}</p>
                  <div className="mt-8">
                    <button className={ctaPrimary} onClick={handleCTA}>{t.ctaBtn}</button>
                  </div>
                </div>
                <div className="rounded-[1.5rem] border border-white/10 bg-[#140f13]/75 shadow-[14px_14px_34px_rgba(216,181,139,0.08),8px_0_22px_rgba(216,181,139,0.05)] p-8 backdrop-blur-md">
                  <div className="text-sm uppercase tracking-[0.28em] text-[#d8b58b]">{t.buildKicker}</div>
                  <h2 className="mt-3 text-3xl font-semibold">{t.buildHeading}</h2>
                  <div className="mt-6 grid gap-3 sm:grid-cols-2">
                    {t.buildItems.map((item) => (
                      <div key={item} className="rounded-[1rem] border border-white/10 bg-[#140f13]/75 px-4 py-3 backdrop-blur-md text-sm text-white/76">{item}</div>
                    ))}
                  </div>
                  <p className="mt-6 text-base leading-8 text-white/68">{t.buildBody}</p>
                </div>
              </div>
            </section>

            {/* Premium positioning quote */}
            <section className="mx-auto max-w-7xl px-6 py-4 lg:px-10">
              <div className="rounded-[1.5rem] border border-white/10 bg-[#140f13]/75 shadow-[14px_14px_34px_rgba(216,181,139,0.08),8px_0_22px_rgba(216,181,139,0.05)] p-8 lg:p-12 backdrop-blur-md">
                <div className="max-w-4xl">
                  <div className="text-sm uppercase tracking-[0.28em] text-[#d8b58b]">{t.premKicker}</div>
                  <h2 className="mt-3 text-4xl font-semibold sm:text-5xl">{t.premHeading}</h2>
                  <p className="mt-6 text-lg leading-8 text-[#f6efe8]">{t.premBody}</p>
                </div>
              </div>
            </section>

            {/* Structure */}
            <section className="mx-auto max-w-7xl px-6 py-20 lg:px-10">
              <div className="grid items-stretch gap-8 lg:grid-cols-[1fr_0.9fr]">
                <div className="rounded-[1.5rem] border border-white/10 bg-[#140f13]/75 shadow-[14px_14px_34px_rgba(216,181,139,0.08),8px_0_22px_rgba(216,181,139,0.05)] p-8 backdrop-blur-md flex h-full flex-col justify-between">
                  <div>
                    <div className="text-sm uppercase tracking-[0.28em] text-[#d8b58b]">{t.structKicker}</div>
                    <h2 className="mt-3 text-4xl font-semibold">{t.structHeading}</h2>
                    <p className="mt-6 text-lg leading-8 text-white/68">{t.structBody1}</p>
                    <p className="mt-5 text-lg leading-8 text-white/68">{t.structBody2}</p>
                  </div>
                  <div className="mt-8">
                    <button className={ctaPrimary} onClick={handleCTA}>{t.ctaBtn}</button>
                  </div>
                </div>
                <div className="rounded-[1.5rem] border border-white/10 bg-[#140f13]/75 shadow-[14px_14px_34px_rgba(216,181,139,0.08),8px_0_22px_rgba(216,181,139,0.05)] p-8 backdrop-blur-md">
                  <div className="text-sm uppercase tracking-[0.28em] text-[#d8b58b]">{t.selKicker}</div>
                  <h3 className="mt-3 text-3xl font-semibold">{t.selHeading}</h3>
                  <div className="mt-6 space-y-4 text-white/72">
                    {t.selItems.map((item, i) => <p key={i}>{item}</p>)}
                  </div>
                </div>
              </div>
            </section>

            {/* FAQ */}
            <section className="mx-auto max-w-7xl px-6 py-20 lg:px-10">
              <div className="max-w-3xl">
                <div className="text-sm uppercase tracking-[0.28em] text-[#d8b58b]">{t.faqKicker}</div>
                <h2 className="mt-3 text-4xl font-semibold">{t.faqHeading}</h2>
              </div>
              <div className="mt-10 grid gap-4">
                {t.faqs.map((item, i) => (
                  <div key={i} className="rounded-[1.5rem] border border-white/10 bg-[#140f13]/75 shadow-[14px_14px_34px_rgba(216,181,139,0.08),8px_0_22px_rgba(216,181,139,0.05)] p-6 backdrop-blur-md">
                    <h3 className="text-xl font-semibold">{item.q}</h3>
                    <p className="mt-3 max-w-4xl text-base leading-7 text-white/68">{item.a}</p>
                  </div>
                ))}
              </div>
            </section>

            {/* Final CTA */}
            <section className="mx-auto max-w-7xl px-6 pb-24 lg:px-10">
              <div className="overflow-hidden rounded-[1.5rem] border border-white/10 bg-[#140f13]/75 shadow-[14px_14px_34px_rgba(216,181,139,0.08),8px_0_22px_rgba(216,181,139,0.05)] p-10 lg:p-14 backdrop-blur-md">
                <div className="max-w-4xl">
                  <div className="text-sm uppercase tracking-[0.28em] text-[#d8b58b]">{t.finalKicker}</div>
                  <h2 className="mt-3 text-4xl font-semibold leading-tight sm:text-5xl">{t.finalHeading}</h2>
                  <p className="mt-6 text-lg leading-8 text-white/72">{t.finalBody}</p>
                  <div className="mt-8 flex flex-col gap-4 sm:flex-row">
                    <button className={ctaPrimary} onClick={handleCTA}>{t.ctaBtn}</button>
                  </div>
                </div>
              </div>
            </section>
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<PremiumCreatorLanding />);
  </script>

  <script>
    // A JSX-et kézzel, classic runtime-mal fordítjuk, hogy ne keletkezzen
    // "import" sor (az automatic runtime miatt) — így file://-en is működik.
    (function () {
      try {
        var src = document.getElementById('app-src').textContent;
        var compiled = Babel.transform(src, {
          presets: [['react', { runtime: 'classic' }]]
        }).code;
        var s = document.createElement('script');
        s.textContent = compiled;
        document.body.appendChild(s);
      } catch (err) {
        document.getElementById('root').innerHTML =
          '<pre style="color:#f6efe8;padding:24px;white-space:pre-wrap;font-family:monospace">'
          + 'Hiba a JSX fordításakor:\n' + (err && err.message ? err.message : err) + '</pre>';
        console.error(err);
      }
    })();
  </script>
</body>
</html>
